<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#0f172a" rx="20"/>
  
  <!-- Gear symbol -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#fbbf24" stroke-width="6"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="#fbbf24" stroke-width="4"/>
  <rect x="60" y="95" width="80" height="10" fill="#fbbf24"/>
  <rect x="60" y="95" width="80" height="10" fill="#fbbf24" transform="rotate(45 100 100)"/>
  <rect x="60" y="95" width="80" height="10" fill="#fbbf24" transform="rotate(90 100 100)"/>
  <rect x="60" y="95" width="80" height="10" fill="#fbbf24" transform="rotate(135 100 100)"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="15" fill="#22c55e"/>
</svg>