<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="#0f172a" rx="20"/>
  
  <!-- Gear symbol (left) -->
  <circle cx="60" cy="80" r="25" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="60" cy="80" r="15" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <rect x="35" y="75" width="50" height="10" fill="#fbbf24" transform="rotate(0 60 80)"/>
  <rect x="35" y="75" width="50" height="10" fill="#fbbf24" transform="rotate(45 60 80)"/>
  <rect x="35" y="75" width="50" height="10" fill="#fbbf24" transform="rotate(90 60 80)"/>
  <rect x="35" y="75" width="50" height="10" fill="#fbbf24" transform="rotate(135 60 80)"/>
  
  <!-- Crane/Scaffolding (center-right) -->
  <rect x="140" y="50" width="8" height="80" fill="#f59e0b"/>
  <rect x="128" y="50" width="50" height="8" fill="#f59e0b"/>
  <line x1="165" y1="50" x2="165" y2="130" stroke="#94a3b8" stroke-width="3"/>
  <line x1="180" y1="50" x2="180" y2="130" stroke="#94a3b8" stroke-width="3"/>
  <line x1="140" y1="70" x2="185" y2="70" stroke="#94a3b8" stroke-width="2"/>
  <line x1="140" y1="90" x2="185" y2="90" stroke="#94a3b8" stroke-width="2"/>
  <line x1="140" y1="110" x2="185" y2="110" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Drill/Tool (right) -->
  <circle cx="280" cy="100" r="12" fill="#f59e0b"/>
  <rect x="290" y="95" width="25" height="10" fill="#1f2937"/>
  <circle cx="265" cy="85" r="8" fill="#f59e0b"/>
  <polygon points="305,100 325,90 325,110" fill="#059669"/>
  
  <!-- Arc/Bracket decorative -->
  <path d="M 50 140 Q 100 160 200 140 Q 250 120 300 140" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Check mark accent -->
  <circle cx="200" cy="165" r="8" fill="none" stroke="#22c55e" stroke-width="2"/>
  <path d="M 196 165 L 199 168 L 204 163" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text: RentaPro -->
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">
    Renta<tspan fill="#fbbf24">Pro</tspan>
  </text>
</svg>